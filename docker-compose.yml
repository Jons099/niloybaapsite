version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: luxe-attire-db
    environment:
      POSTGRES_DB: luxe_attire
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - luxe-network

  redis:
    image: redis:7-alpine
    container_name: luxe-attire-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - luxe-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: luxe-attire-backend
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: luxe_attire
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
      - uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - luxe-network
    command: npm run dev

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: luxe-attire-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - luxe-network

volumes:
  postgres_data:
  redis_data:
  uploads:

networks:
  luxe-network:
    driver: bridge